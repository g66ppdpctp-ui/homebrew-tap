name: Update CodeIsland cask

on:
  schedule:
    - cron: '43 10 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cask:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CURRENT=""
          if [ -f Casks/codeisland.rb ]; then
            CURRENT=$(grep -E "^\s+version" Casks/codeisland.rb | sed -E 's/.*"(.+)".*/\1/')
          fi
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"

          TAG=$(gh api repos/g66ppdpctp-ui/CodeIsland/releases/latest -q .tag_name)
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "No release found, skipping" >&2
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - id: check
        if: steps.release.outputs.skip != 'true'
        run: |
          if [ "${{ steps.release.outputs.version }}" = "${{ steps.release.outputs.current }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.check.outputs.skip == 'false'
        run: |
          gh release download "${{ steps.release.outputs.tag }}" \
            --repo g66ppdpctp-ui/CodeIsland \
            --pattern "*.dmg" \
            --dir /tmp

      - if: steps.check.outputs.skip == 'false'
        id: sha
        run: |
          SHA=$(shasum -a 256 /tmp/CodeIsland.dmg | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - if: steps.check.outputs.skip == 'false'
        run: |
          cat > Casks/codeisland.rb << CASK_EOF
          cask "codeisland" do
            version "${{ steps.release.outputs.version }}"
            sha256 "${{ steps.sha.outputs.sha256 }}"

            url "https://github.com/g66ppdpctp-ui/CodeIsland/releases/download/v#{version}/CodeIsland.dmg"
            name "CodeIsland"
            desc "Menu bar companion for Claude Code, Codex, Gemini CLI and more (auto-built fork)"
            homepage "https://github.com/g66ppdpctp-ui/CodeIsland"

            app "CodeIsland.app"

            zap trash: [
              "~/.codeisland",
            ]
          end
          CASK_EOF

      - if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/codeisland.rb
          git diff --cached --quiet || git commit -m "Update codeisland to v${{ steps.release.outputs.version }}"
          git push
