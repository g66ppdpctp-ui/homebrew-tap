name: Update CodeIsland cask

on:
  schedule:
    # Every 6 hours, offset from upstream sync to give build time
    - cron: '43 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cask:
    runs-on: macos-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4

      - name: Get fork latest release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Read the current cask version for comparison
          CURRENT=""
          if [ -f Casks/codeisland.rb ]; then
            CURRENT=$(grep -E "^\s+version" Casks/codeisland.rb | sed -E 's/.*"(.+)".*/\1/')
          fi
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"

          # Get the latest release from CodeIsland fork (public repo)
          RELEASE_JSON=$(curl -sL https://api.github.com/repos/g66ppdpctp-ui/CodeIsland/releases/latest)
          TAG=$(echo "$RELEASE_JSON" | jq -r .tag_name)
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Latest fork release: $TAG (current cask: $CURRENT)"

      - name: Skip if up to date
        id: check
        run: |
          if [ "${{ steps.release.outputs.version }}" = "${{ steps.release.outputs.current }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Cask is already at latest version"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "New version available: ${{ steps.release.outputs.version }}"
          fi

      - name: Download DMG from fork release
        if: steps.check.outputs.skip == 'false'
        run: |
          curl -sL \
            "https://github.com/g66ppdpctp-ui/CodeIsland/releases/download/${{ steps.release.outputs.tag }}/CodeIsland.dmg" \
            -o /tmp/CodeIsland.dmg
          ls -lh /tmp/CodeIsland.dmg

      - name: Compute SHA256
        if: steps.check.outputs.skip == 'false'
        id: sha
        run: |
          SHA=$(shasum -a 256 /tmp/CodeIsland.dmg | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "SHA256: $SHA"

      - name: Update cask formula
        if: steps.check.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          SHA256="${{ steps.sha.outputs.sha256 }}"

          cat > Casks/codeisland.rb << CASK_EOF
          cask "codeisland" do
            version "$VERSION"
            sha256 "$SHA256"

            url "https://github.com/g66ppdpctp-ui/CodeIsland/releases/download/v#{version}/CodeIsland.dmg"
            name "CodeIsland"
            desc "Menu bar companion for Claude Code, Codex, Gemini CLI and more (auto-built fork)"
            homepage "https://github.com/g66ppdpctp-ui/CodeIsland"

            app "CodeIsland.app"

            zap trash: [
              "~/.codeisland",
            ]
          end
          CASK_EOF
          echo "Cask updated to v${VERSION}"

      - name: Commit and push
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/codeisland.rb
          git diff --cached --quiet || git commit -m "Update codeisland to v${{ steps.release.outputs.version }}"
          git push
